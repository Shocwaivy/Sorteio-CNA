<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="shortcut icon" href="images/Logo-CNA-2018.png" type="image/x-icon">
    <link rel="stylesheet" href="contato.css">
</head>
<body>
    <h1>CNA Campos Salles</h1>
    <p>Envie um print do seu prêmio para nós.</p>
    <button class="whats" onclick="window.open('https://wa.me/551621117755', '_blank')"><img class="logozap" src="/images/whatsapp_logo_icon_186881.webp" alt=""></button>
    <div class="premioGanho">
        <h2>Prêmio Ganho</h2>
        <img id="imagemPremio" src="" alt="Prêmio ganho" style="max-width: 300px; margin-top: 1px;">
    </div>
    <h2>Informações de Contato</h2>
    <p><strong>Endereço:</strong> Rua Campos Salles, 730 - Centro, Ribeirão Preto, São Paulo</p>
    <p><strong>Telefone:</strong> (16)2111-7755</p>
    

    <script>
        // Recupera a imagem da carta escolhida do localStorage
        window.addEventListener('DOMContentLoaded', () => {
            const cartaEscolhida = localStorage.getItem('cartaEscolhida');
            const numeroSorteado = localStorage.getItem('ultimoNumeroSorteado');
            
            if (cartaEscolhida) {
                document.getElementById('imagemPremio').src = cartaEscolhida;
            }
            
            if (numeroSorteado) {
                console.log('Número ganho:', numeroSorteado);
            }
        });
    </script>
</body>
</html>
