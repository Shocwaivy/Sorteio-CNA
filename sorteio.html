<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOA SORTE!</title>
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="sorteio.css">
    <script src="sorteio.js"></script>
</head>
<body>
    <div class="imagens">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Logo-CNA-2018.png/1280px-Logo-CNA-2018.png" alt="Logo CNA">
    </div>
    <div class="sorteio">
        <div class="cartas">
            <div class="carta-container">
                <img src="images/1.png" alt="Cartas" onclick="virar(this)">
            </div>
            <div class="carta-container">
                <img src="images/2.png" alt="Cartas" onclick="virar(this)">
            </div>
            <div class="carta-container">
                <img src="images/3.png" alt="Cartas" onclick="virar(this)">
            </div>
            <div class="carta-container">
                <img src="images/4.png" alt="Cartas" onclick="virar(this)">
            </div>
            <div class="carta-container">
                <img src="images/5.png" alt="Cartas" onclick="virar(this)">
            </div>
            <div class="carta-container">
                <img src="images/6.png" alt="Cartas" onclick="virar(this)">
            </div>
        </div>
        <div id="resultado" style="display: none; margin-top: 20px; font-size: 24px; font-weight: bold;">
            Número sorteado: <span id="numeroSorteado">0</span>
        </div>
    </div>

</body>
</html>
